<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EM 플러스 학원 - 학생 진도 현황 대시보드</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/bcryptjs@2.4.3/dist/bcrypt.min.js"></script>
    <script>var bcrypt = dcodeIO.bcrypt;</script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Loading Screen -->
    <div id="loading-screen" style="display:flex;align-items:center;justify-content:center;height:100vh;font-family:'Noto Sans KR',sans-serif;color:#6B7280;">
        <div style="text-align:center;">
            <i class="fas fa-spinner fa-spin" style="font-size:2rem;color:#4F46E5;"></i>
            <p style="margin-top:1rem;">데이터를 불러오는 중...</p>
        </div>
    </div>

    <!-- Login Screen -->
    <div id="login-screen" class="login-screen">
        <div class="login-card">
            <div class="login-logo">
                <img src="images/logo.png" alt="EM플러스학원" class="login-logo-img">
                <p>학생 진도 관리 시스템</p>
            </div>
            <form id="login-form">
                <div class="form-group">
                    <label>아이디</label>
                    <input type="text" class="form-control" id="login-id" placeholder="아이디를 입력하세요" required autocomplete="username">
                </div>
                <div class="form-group">
                    <label>비밀번호</label>
                    <input type="password" class="form-control" id="login-pw" placeholder="비밀번호를 입력하세요" required autocomplete="current-password">
                </div>
                <div id="login-error" class="login-error" style="display:none"></div>
                <button type="submit" class="btn btn-primary btn-lg" style="width:100%"><i class="fas fa-sign-in-alt"></i> 로그인</button>
            </form>
            <div class="login-toggle">
                <span>계정이 없으신가요?</span>
                <a href="#" id="show-register">회원가입</a>
            </div>
        </div>

        <!-- Registration Card -->
        <div class="login-card register-card" id="register-card" style="display:none">
            <div class="login-logo">
                <img src="images/logo.png" alt="EM플러스학원" class="login-logo-img">
                <p>회원가입</p>
            </div>
            <form id="register-form">
                <div class="form-group">
                    <label>회원 유형 <span class="required">*</span></label>
                    <div class="register-role-tabs">
                        <button type="button" class="role-tab active" data-role="student"><i class="fas fa-user-graduate"></i> 학생</button>
                        <button type="button" class="role-tab" data-role="teacher"><i class="fas fa-chalkboard-teacher"></i> 선생님</button>
                        <button type="button" class="role-tab" data-role="director"><i class="fas fa-user-shield"></i> 원장</button>
                    </div>
                    <input type="hidden" id="reg-role" value="student">
                </div>
                <div class="form-group">
                    <label>이름 <span class="required">*</span></label>
                    <input type="text" class="form-control" id="reg-name" placeholder="이름을 입력하세요" required>
                </div>
                <div class="form-group">
                    <label>아이디 <span class="required">*</span></label>
                    <input type="text" class="form-control" id="reg-id" placeholder="로그인 아이디" required autocomplete="username">
                </div>
                <div class="form-group">
                    <label>비밀번호 <span class="required">*</span></label>
                    <input type="password" class="form-control" id="reg-pw" placeholder="비밀번호" required autocomplete="new-password">
                </div>
                <div class="form-group">
                    <label>비밀번호 확인 <span class="required">*</span></label>
                    <input type="password" class="form-control" id="reg-pw-confirm" placeholder="비밀번호 확인" required autocomplete="new-password">
                </div>
                <!-- Student-only fields -->
                <div id="reg-student-fields">
                    <div class="form-row">
                        <div class="form-group">
                            <label>학교</label>
                            <input type="text" class="form-control" id="reg-school" placeholder="학교명">
                        </div>
                        <div class="form-group">
                            <label>학년</label>
                            <select class="form-control" id="reg-grade">
                                <option value="중1">중1</option>
                                <option value="중2">중2</option>
                                <option value="중3">중3</option>
                                <option value="고1" selected>고1</option>
                                <option value="고2">고2</option>
                                <option value="고3">고3</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>반</label>
                            <input type="text" class="form-control" id="reg-class" placeholder="반 이름">
                        </div>
                        <div class="form-group">
                            <label>연락처</label>
                            <input type="tel" class="form-control" id="reg-phone" placeholder="010-0000-0000">
                        </div>
                    </div>
                </div>
                <div id="register-error" class="login-error" style="display:none"></div>
                <button type="submit" class="btn btn-primary btn-lg" style="width:100%"><i class="fas fa-user-plus"></i> 가입하기</button>
            </form>
            <div class="login-toggle">
                <span>이미 계정이 있으신가요?</span>
                <a href="#" id="show-login">로그인</a>
            </div>
        </div>
    </div>

    <!-- Main App (hidden until login) -->
    <div id="app" style="display:none">
        <!-- Sidebar -->
        <aside id="sidebar">
            <div class="sidebar-header">
                <div class="logo" style="cursor:pointer" onclick="App.navigate('dashboard')">
                    <img src="images/logo1.png" alt="EM플러스학원" class="sidebar-logo-img">
                </div>
            </div>
            <nav class="sidebar-nav">
                <!-- Group 1: 학생 -->
                <div class="nav-group open" id="navg-student">
                    <button class="nav-group-header" data-group="navg-student">
                        <i class="fas fa-user-graduate"></i>
                        <span>학생</span>
                        <i class="fas fa-chevron-down nav-group-arrow"></i>
                    </button>
                    <div class="nav-group-items">
                        <a href="#" class="nav-item active" data-view="dashboard">
                            <i class="fas fa-chart-pie"></i>
                            <span>대시보드</span>
                        </a>
                        <a href="#" class="nav-item" data-view="students">
                            <i class="fas fa-users"></i>
                            <span>학생 관리</span>
                        </a>
                        <a href="#" id="nav-attendance" class="nav-item" data-view="attendance" style="display:none">
                            <i class="fas fa-calendar-check"></i>
                            <span>출석 관리</span>
                        </a>
                        <a href="#" id="nav-consultations" class="nav-item" data-view="consultations" style="display:none">
                            <i class="fas fa-comments"></i>
                            <span>상담 일지</span>
                            <span id="consult-badge" class="unread-badge" style="display:none"></span>
                        </a>
                        <a href="#" id="nav-analytics" class="nav-item" data-view="analytics" style="display:none">
                            <i class="fas fa-chart-bar"></i>
                            <span>비교 분석</span>
                        </a>
                        <a href="#" id="nav-teachers" class="nav-item" data-view="teachers" style="display:none">
                            <i class="fas fa-chalkboard-teacher"></i>
                            <span>선생님 관리</span>
                        </a>
                    </div>
                </div>

                <!-- Group 2: 학습 -->
                <div class="nav-group open" id="navg-study">
                    <button class="nav-group-header" data-group="navg-study">
                        <i class="fas fa-book-open"></i>
                        <span>학습</span>
                        <i class="fas fa-chevron-down nav-group-arrow"></i>
                    </button>
                    <div class="nav-group-items">
                        <a href="#" class="nav-item" data-view="plans">
                            <i class="fas fa-book-open"></i>
                            <span>학습 계획</span>
                        </a>
                        <a href="#" class="nav-item" data-view="progress">
                            <i class="fas fa-chart-line"></i>
                            <span>진도 현황</span>
                        </a>
                        <a href="#" id="nav-homework" class="nav-item" data-view="homework">
                            <i class="fas fa-tasks"></i>
                            <span>숙제 관리</span>
                            <span id="homework-badge" class="unread-badge" style="display:none"></span>
                        </a>
                        <a href="#" id="nav-exam" class="nav-item" data-view="exam">
                            <i class="fas fa-clipboard-check"></i>
                            <span>시험 플래너</span>
                            <span id="exam-badge" class="unread-badge" style="display:none"></span>
                        </a>
                        <a href="#" class="nav-item" data-view="comments">
                            <i class="fas fa-comments"></i>
                            <span>코멘트</span>
                        </a>
                        <a href="#" id="nav-schedule" class="nav-item" data-view="schedule">
                            <i class="fas fa-calendar-week"></i>
                            <span>시간표</span>
                        </a>
                        <a href="#" id="nav-report" class="nav-item" data-view="report">
                            <i class="fas fa-file-alt"></i>
                            <span>월간 리포트</span>
                        </a>
                    </div>
                </div>

                <!-- Group 3: 운영 -->
                <div class="nav-group open" id="navg-ops">
                    <button class="nav-group-header" data-group="navg-ops">
                        <i class="fas fa-cog"></i>
                        <span>운영</span>
                        <i class="fas fa-chevron-down nav-group-arrow"></i>
                    </button>
                    <div class="nav-group-items">
                        <a href="#" class="nav-item" data-view="grades">
                            <i class="fas fa-trophy"></i>
                            <span>성적 관리</span>
                        </a>
                        <a href="#" class="nav-item" data-view="board">
                            <i class="fas fa-clipboard-list"></i>
                            <span>학원 게시판</span>
                        </a>
                        <a href="#" id="nav-notifications" class="nav-item" data-view="notifications">
                            <i class="fas fa-bell"></i>
                            <span>알림 센터</span>
                            <span id="notif-nav-badge" class="unread-badge" style="display:none"></span>
                        </a>
                        <a href="#" class="nav-item" data-view="messages">
                            <i class="fas fa-envelope"></i>
                            <span>내부 소통</span>
                            <span id="unread-badge" class="unread-badge" style="display:none"></span>
                        </a>
                        <a href="#" id="nav-tasks" class="nav-item" data-view="tasks" style="display:none">
                            <i class="fas fa-check-square"></i>
                            <span>업무 노트</span>
                        </a>
                        <a href="#" id="nav-tuition" class="nav-item" data-view="tuition" style="display:none">
                            <i class="fas fa-won-sign"></i>
                            <span>수업료 관리</span>
                        </a>
                    </div>
                </div>
            </nav>

        </aside>
        <div id="sidebar-overlay" class="sidebar-overlay"></div>

        <!-- Main Content -->
        <main id="main-content">
            <!-- Header -->
            <header id="header">
                <div class="header-left">
                    <button id="sidebar-toggle" class="btn-icon">
                        <i class="fas fa-bars"></i>
                    </button>
                    <h1 id="page-title">대시보드</h1>
                </div>
                <div class="header-right">
                    <div class="search-box">
                        <input type="text" id="global-search" placeholder="학생 검색...">
                        <button id="btn-search" class="search-btn" title="검색"><i class="fas fa-search"></i></button>
                    </div>
                    <div class="user-info">
                        <span id="user-badge" class="user-badge"></span>
                        <button id="btn-notifications" class="btn-icon notif-bell" title="알림 센터" data-action="go-notifications" style="position:relative;font-size:1.15rem;color:var(--gray-600)">
                            <i class="fas fa-bell"></i>
                            <span id="notif-header-badge" class="notif-header-badge" style="display:none"></span>
                        </button>
                        <button id="btn-logout" class="btn btn-sm btn-outline" style="color:#6366F1;border-color:#6366F1">
                            <i class="fas fa-sign-out-alt"></i> 로그아웃
                        </button>
                    </div>
                </div>
            </header>

            <!-- Content Area -->
            <div id="content-area">
                <!-- Views rendered dynamically by app.js -->
            </div>
        </main>
    </div>

    <!-- Modal -->
    <div id="modal-overlay" class="modal-overlay hidden">
        <div id="modal" class="modal">
            <div class="modal-header">
                <h2 id="modal-title"></h2>
                <button class="modal-close btn-icon">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div id="modal-body" class="modal-body"></div>
        </div>
    </div>

    <script src="js/supabase-config.js"></script>
    <script src="js/data.js"></script>
    <script src="js/permissions.js"></script>
    <script src="js/charts.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
